<!DOCTYPE html>
<html>

  <head>
    <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    body { font-family: sans-serif; width: 220px; padding: 10px; background: #313338; color: white; }
    div { margin-bottom: 15px; }
    label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    select { width: 100%; padding: 5px; margin-top: 5px; background: #1e1f22; color: white; border: 1px solid #555; border-radius: 4px; }
  </style>
</head>
<body>
  <div>
    <label>
      <input type="checkbox" id="toggle-switch" checked />
      Enable Auto-Embed
    </label>
  </div>
  <div>
 <label for="domain-select">Embed Type:</label>
<!-- Add your discord embed fixes here if you have any extra for example hitlerx works aswell but i havent added it as an option --> 
      <select id="domain-select">
      <option value="vxtwitter.com">vxtwitter</option>
      <option value="fixupx.com">fixupx (GIF-capable)</option>
      <option value="girlcockx.com">girlcockx</option>
      <option value="fxtwitter.com">fxtwitter (GIF-capable)</option>
      <option value="hitlerx.com">hitlerx</option>
    </select>
  </div>
  <div>
    <label>
      <input type="checkbox" id="gif-safe-toggle" />
      Force GIF-capable embed
    </label>
    <div style="font-size: 11px; color: #999; margin-top: 4px;">
      Checks each pasted link individually — only animated GIF tweets get routed through fxtwitter/fixupx for autoplay. Everything else still uses your Embed Type above.
    </div>
  </div>
  <script src="dist/popup.js"></script>
</body>
</html>
